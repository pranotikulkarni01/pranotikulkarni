<!DOCTYPE html>
<html>
<head>
    <title>Smart Recommendation System</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
            background-color: #f5f5f5;
        }
        input {
            padding: 10px;
            width: 300px;
        }
        button {
            padding: 10px 20px;
            background-color: green;
            color: white;
            border: none;
            margin-top: 10px;
        }
        #output {
            margin-top: 20px;
            font-size: 18px;
            color: blue;
        }
    </style>
</head>
<body>

<h2>🎯 Recommendation Engine</h2>

<p>Enter preferences (comma separated)</p>
<input type="text" id="userInput" placeholder="Example: A,B,C">

<br>
<button onclick="generateRecommendation()">Get Recommendations</button>

<div id="output"></div>

<script>
function generateRecommendation() {
    let input = document.getElementById("userInput").value.trim();

    if (input === "") {
        document.getElementById("output").innerText =
            "🔥 Popular Items: X, Y, Z";
        return;
    }

    let prefs = input.toUpperCase().split(",");
    let result = "";

    if (prefs.length === 1) {
        result = "👉 Similar to " + prefs[0] + ": " + prefs[0] + "1, " + prefs[0] + "2";
    }
    else if (prefs.length > 1) {
        result = "⭐ Ranked Recommendations:\n";
        for (let i = 0; i < prefs.length; i++) {
            result += (i+1) + ". " + prefs[i] + " related item\n";
        }
    }

    document.getElementById("output").innerText = result;
}
</script>

</body>
</html>
